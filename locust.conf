# Locust config consumed both locally (--config locust.conf) and by Azure
# Load Testing (referenced via properties.userPropertyFile in azure-loadtest.yaml).
#
# `users` MUST equal the sum of GITHUB_USERS + LEARN_USERS + CONTEXT7_USERS +
# ADO_USERS so each User class spawns exactly its `fixed_count`. Default split
# 2 + 5 + 5 + 5 = 17.
locustfile = multi.py
headless = true
users = 17
spawn-rate = 5
run-time = 4m
stop-timeout = 10
csv = results/run
html = results/run.html
